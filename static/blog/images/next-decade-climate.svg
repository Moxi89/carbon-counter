<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4cc9f0;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#4361ee;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="decadeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4361ee;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#3f37c9;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#4cc9f0;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGrad)" />
  
  <!-- Timeline 2025-2035 -->
  <g transform="translate(50, 100)">
    <!-- Timeline line -->
    <line x1="0" y1="50" x2="600" y2="50" stroke="#4361ee" stroke-width="4"/>
    
    <!-- Year markers -->
    <g>
      <!-- 2025 -->
      <circle cx="0" cy="50" r="8" fill="#ff6b6b" stroke="#ffffff" stroke-width="2"/>
      <text x="0" y="80" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">2025</text>
      <text x="0" y="35" fill="#ff6b6b" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">START</text>
      
      <!-- 2027 -->
      <circle cx="150" cy="50" r="6" fill="#ffd60a" stroke="#ffffff" stroke-width="2"/>
      <text x="150" y="80" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">2027</text>
      
      <!-- 2030 -->
      <circle cx="300" cy="50" r="8" fill="#ff6b6b" stroke="#ffffff" stroke-width="2"/>
      <text x="300" y="80" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">2030</text>
      <text x="300" y="35" fill="#ff6b6b" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">PEAK</text>
      
      <!-- 2033 -->
      <circle cx="450" cy="50" r="6" fill="#ffd60a" stroke="#ffffff" stroke-width="2"/>
      <text x="450" y="80" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">2033</text>
      
      <!-- 2035 -->
      <circle cx="600" cy="50" r="8" fill="#4cc9f0" stroke="#ffffff" stroke-width="2"/>
      <text x="600" y="80" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">2035</text>
      <text x="600" y="35" fill="#4cc9f0" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">LOCK-IN</text>
    </g>
    
    <!-- Critical period highlight -->
    <rect x="250" y="20" width="100" height="60" fill="#ff6b6b" opacity="0.2" rx="5"/>
    <text x="300" y="15" fill="#ff6b6b" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">CRITICAL</text>
  </g>
  
  <!-- Strategy pillars -->
  <g transform="translate(50, 200)">
    <!-- Adaptation pillar -->
    <rect x="0" y="0" width="180" height="120" rx="8" fill="#1a2332" stroke="#4cc9f0" stroke-width="2"/>
    <text x="90" y="25" fill="#4cc9f0" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">ADAPTATION</text>
    
    <!-- Adaptation icons -->
    <g transform="translate(20, 40)">
      <!-- Water drop -->
      <path d="M 20 0 Q 10 15 20 30 Q 30 15 20 0" fill="#4cc9f0" opacity="0.8"/>
      <text x="20" y="50" fill="#8b95a5" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Water</text>
    </g>
    
    <g transform="translate(70, 40)">
      <!-- Heat shield -->
      <rect x="10" y="5" width="20" height="20" rx="3" fill="#ffd60a" opacity="0.8"/>
      <text x="20" y="50" fill="#8b95a5" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Heat</text>
    </g>
    
    <g transform="translate(120, 40)">
      <!-- Home -->
      <path d="M 15 10 L 25 0 L 35 10 L 35 25 L 15 25 Z" fill="#4ae290" opacity="0.8"/>
      <text x="25" y="50" fill="#8b95a5" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Home</text>
    </g>
    
    <text x="90" y="105" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Priority #1</text>
  </g>
  
  <!-- Mitigation pillar -->
  <g transform="translate(250, 200)">
    <rect x="0" y="0" width="180" height="120" rx="8" fill="#1a2332" stroke="#4ae290" stroke-width="2"/>
    <text x="90" y="25" fill="#4ae290" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">MITIGATION</text>
    
    <!-- Mitigation icons -->
    <g transform="translate(20, 40)">
      <!-- Wind turbine -->
      <line x1="20" y1="5" x2="20" y2="25" stroke="#4ae290" stroke-width="3"/>
      <path d="M 10 8 Q 20 0 30 8" fill="none" stroke="#4ae290" stroke-width="2"/>
      <text x="20" y="50" fill="#8b95a5" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Renew</text>
    </g>
    
    <g transform="translate(70, 40)">
      <!-- EV symbol -->
      <rect x="10" y="10" width="20" height="10" rx="2" fill="#4cc9f0" opacity="0.8"/>
      <text x="20" y="35" fill="#ffffff" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">EV</text>
      <text x="20" y="50" fill="#8b95a5" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Transport</text>
    </g>
    
    <g transform="translate(120, 40)">
      <!-- Factory -->
      <rect x="10" y="15" width="20" height="15" fill="#ffd60a" opacity="0.8"/>
      <rect x="15" y="10" width="10" height="5" fill="#ff6b6b" opacity="0.8"/>
      <text x="20" y="50" fill="#8b95a5" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Industry</text>
    </g>
    
    <text x="90" y="105" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Priority #2</text>
  </g>
  
  <!-- Negative emissions pillar -->
  <g transform="translate(450, 200)">
    <rect x="0" y="0" width="180" height="120" rx="8" fill="#1a2332" stroke="#ffd60a" stroke-width="2"/>
    <text x="90" y="25" fill="#ffd60a" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">NEGATIVE EMISSIONS</text>
    
    <!-- Negative emissions icons -->
    <g transform="translate(20, 40)">
      <!-- CO2 capture -->
      <rect x="10" y="5" width="20" height="25" rx="2" fill="#4361ee" opacity="0.8"/>
      <text x="20" y="20" fill="#ffffff" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">CO2</text>
      <text x="20" y="50" fill="#8b95a5" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">DAC</text>
    </g>
    
    <g transform="translate(70, 40)">
      <!-- Tree -->
      <circle cx="20" cy="10" r="8" fill="#4ae290" opacity="0.8"/>
      <rect x="18" y="15" width="4" height="15" fill="#8b5a3c" opacity="0.8"/>
      <text x="20" y="50" fill="#8b95a5" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Forest</text>
    </g>
    
    <g transform="translate(120, 40)">
      <!-- Soil -->
      <rect x="10" y="10" width="20" height="20" fill="#8b5a3c" opacity="0.8"/>
      <text x="20" y="50" fill="#8b95a5" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Soil</text>
    </g>
    
    <text x="90" y="105" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Priority #3</text>
  </g>
  
  <!-- Urgency meter -->
  <g transform="translate(680, 100)">
    <!-- Meter background -->
    <rect x="0" y="0" width="80" height="200" rx="8" fill="#1a2332" stroke="#ff6b6b" stroke-width="2"/>
    
    <!-- Urgency level -->
    <rect x="10" y="10" width="60" height="150" rx="4" fill="#ff6b6b" opacity="0.8"/>
    
    <!-- Meter text -->
    <text x="40" y="180" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">URGENCY</text>
    <text x="40" y="195" fill="#ff6b6b" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">CRITICAL</text>
  </g>
  
  <!-- Title -->
  <text x="400" y="30" fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle">Next Decade Climate Action</text>
</svg>
