<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7209b7;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#4361ee;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="techGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4361ee;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#7209b7;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#4cc9f0;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGrad)" />
  
  <!-- Direct Air Capture -->
  <g transform="translate(50, 100)">
    <!-- DAC machine -->
    <rect x="0" y="20" width="80" height="60" rx="8" fill="#1a2332" stroke="#4361ee" stroke-width="2"/>
    <!-- Fan blades -->
    <circle cx="40" cy="50" r="15" fill="none" stroke="#4cc9f0" stroke-width="3"/>
    <line x1="40" y1="35" x2="40" y2="65" stroke="#4cc9f0" stroke-width="2"/>
    <line x1="25" y1="50" x2="55" y2="50" stroke="#4cc9f0" stroke-width="2"/>
    <!-- CO2 molecules being captured -->
    <circle cx="20" cy="10" r="4" fill="#ff6b6b" opacity="0.8"/>
    <circle cx="40" cy="5" r="4" fill="#ff6b6b" opacity="0.8"/>
    <circle cx="60" cy="10" r="4" fill="#ff6b6b" opacity="0.8"/>
    <!-- Arrows showing capture -->
    <path d="M 20 15 L 30 35" stroke="#4361ee" stroke-width="2" opacity="0.6"/>
    <path d="M 40 10 L 40 35" stroke="#4361ee" stroke-width="2" opacity="0.6"/>
    <path d="M 60 15 L 50 35" stroke="#4361ee" stroke-width="2" opacity="0.6"/>
    <!-- Label -->
    <text x="40" y="100" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">DAC</text>
    <text x="40" y="115" fill="#4cc9f0" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">$100/ton</text>
  </g>
  
  <!-- Green Hydrogen -->
  <g transform="translate(200, 100)">
    <!-- Electrolyzer -->
    <rect x="10" y="30" width="60" height="40" rx="5" fill="#1a2332" stroke="#4ae290" stroke-width="2"/>
    <!-- Water input -->
    <circle cx="20" cy="20" r="6" fill="#4cc9f0" opacity="0.8"/>
    <text x="20" y="10" fill="#4cc9f0" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">H2O</text>
    <!-- Electricity input -->
    <path d="M 0 50 L 10 50" stroke="#ffd60a" stroke-width="3"/>
    <text x="5" y="45" fill="#ffd60a" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">E</text>
    <!-- H2 output -->
    <circle cx="80" cy="50" r="6" fill="#4ae290" opacity="0.8"/>
    <text x="80" y="40" fill="#4ae290" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">H2</text>
    <!-- O2 output -->
    <circle cx="40" cy="85" r="6" fill="#4cc9f0" opacity="0.8"/>
    <text x="40" y="100" fill="#4cc9f0" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">O2</text>
    <!-- Label -->
    <text x="40" y="120" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Green H2</text>
    <text x="40" y="135" fill="#4ae290" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">$1.50/kg</text>
  </g>
  
  <!-- Advanced Battery -->
  <g transform="translate(350, 100)">
    <!-- Battery shape -->
    <rect x="10" y="30" width="60" height="40" rx="5" fill="#1a2332" stroke="#7209b7" stroke-width="2"/>
    <rect x="70" y="40" width="10" height="20" rx="2" fill="#7209b7"/>
    <!-- Battery cells -->
    <rect x="15" y="35" width="15" height="30" rx="2" fill="#4cc9f0" opacity="0.8"/>
    <rect x="32" y="35" width="15" height="30" rx="2" fill="#4cc9f0" opacity="0.8"/>
    <rect x="49" y="35" width="15" height="30" rx="2" fill="#4cc9f0" opacity="0.8"/>
    <!-- Solid state indicator -->
    <text x="40" y="50" fill="#ffffff" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">SS</text>
    <!-- Lightning bolt -->
    <path d="M 35 15 L 40 25 L 37 25 L 45 35 L 40 25 L 43 25 Z" fill="#ffd60a"/>
    <!-- Label -->
    <text x="40" y="100" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Solid State</text>
    <text x="40" y="115" fill="#7209b7" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">2x Density</text>
  </g>
  
  <!-- Small Modular Reactor -->
  <g transform="translate(500, 100)">
    <!-- Reactor dome -->
    <path d="M 40 20 Q 10 20 10 40 Q 10 60 40 60 Q 70 60 70 40 Q 70 20 40 20" fill="#1a2332" stroke="#ffd60a" stroke-width="2"/>
    <!-- Reactor core -->
    <circle cx="40" cy="40" r="15" fill="#ffd60a" opacity="0.6"/>
    <!-- Cooling towers -->
    <rect x="15" y="65" width="8" height="20" fill="#4cc9f0" opacity="0.8"/>
    <rect x="57" y="65" width="8" height="20" fill="#4cc9f0" opacity="0.8"/>
    <!-- Steam -->
    <path d="M 17 60 Q 15 55 17 50" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
    <path d="M 63 60 Q 65 55 63 50" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
    <!-- Label -->
    <text x="40" y="100" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">SMR</text>
    <text x="40" y="115" fill="#ffd60a" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">24/7 Clean</text>
  </g>
  
  <!-- Investment flow -->
  <g transform="translate(650, 80)">
    <!-- Money flow arrow -->
    <path d="M 0 0 L -20 40 L -10 40 L -10 80 L 10 80 L 10 40 L 20 40 Z" fill="#4ae290" opacity="0.8"/>
    <text x="0" y="100" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">$3.5T</text>
    <text x="0" y="120" fill="#8b95a5" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Investment</text>
  </g>
  
  <!-- Breakthrough indicators -->
  <g transform="translate(50, 250)">
    <rect x="0" y="0" width="700" height="80" rx="8" fill="#1a2332" stroke="#4361ee" stroke-width="1" opacity="0.3"/>
    
    <!-- Breakthrough badges -->
    <g transform="translate(50, 25)">
      <circle cx="0" cy="0" r="15" fill="#4361ee" opacity="0.8"/>
      <text x="0" y="5" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">!</text>
      <text x="0" y="30" fill="#ffffff" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">DAC Viable</text>
    </g>
    
    <g transform="translate(200, 25)">
      <circle cx="0" cy="0" r="15" fill="#4ae290" opacity="0.8"/>
      <text x="0" y="5" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">!</text>
      <text x="0" y="30" fill="#ffffff" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">H2 Competitive</text>
    </g>
    
    <g transform="translate(350, 25)">
      <circle cx="0" cy="0" r="15" fill="#7209b7" opacity="0.8"/>
      <text x="0" y="5" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">!</text>
      <text x="0" y="30" fill="#ffffff" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Battery Break</text>
    </g>
    
    <g transform="translate(500, 25)">
      <circle cx="0" cy="0" r="15" fill="#ffd60a" opacity="0.8"/>
      <text x="0" y="5" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">!</text>
      <text x="0" y="30" fill="#ffffff" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">SMR Ready</text>
    </g>
  </g>
  
  <!-- Title -->
  <text x="400" y="30" fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle">Climate Tech Innovations 2026</text>
</svg>
