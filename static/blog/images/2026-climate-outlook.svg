<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#e76f51;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="crisisGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#f4a261;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#e76f51;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGrad)" />
  
  <!-- Calendar 2026 -->
  <g transform="translate(50, 50)">
    <!-- Calendar frame -->
    <rect x="0" y="0" width="120" height="140" rx="8" fill="#1a2332" stroke="#ff6b6b" stroke-width="2"/>
    <!-- Header -->
    <rect x="0" y="0" width="120" height="30" rx="8" fill="url(#crisisGrad)"/>
    <text x="60" y="20" fill="#ffffff" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">2026</text>
    <!-- Grid -->
    <g opacity="0.7">
      <line x1="0" y1="40" x2="120" y2="40" stroke="#ff6b6b" stroke-width="1"/>
      <line x1="0" y1="60" x2="120" y2="60" stroke="#ff6b6b" stroke-width="1"/>
      <line x1="0" y1="80" x2="120" y2="80" stroke="#ff6b6b" stroke-width="1"/>
      <line x1="0" y1="100" x2="120" y2="100" stroke="#ff6b6b" stroke-width="1"/>
      <line x1="0" y1="120" x2="120" y2="120" stroke="#ff6b6b" stroke-width="1"/>
      <line x1="30" y1="30" x2="30" y2="140" stroke="#ff6b6b" stroke-width="1"/>
      <line x1="60" y1="30" x2="60" y2="140" stroke="#ff6b6b" stroke-width="1"/>
      <line x1="90" y1="30" x2="90" y2="140" stroke="#ff6b6b" stroke-width="1"/>
    </g>
    <!-- Warning symbols on some dates -->
    <text x="20" y="55" fill="#ff6b6b" font-family="Arial, sans-serif" font-size="16" text-anchor="middle">!</text>
    <text x="50" y="75" fill="#ff6b6b" font-family="Arial, sans-serif" font-size="16" text-anchor="middle">!</text>
    <text x="80" y="95" fill="#ff6b6b" font-family="Arial, sans-serif" font-size="16" text-anchor="middle">!</text>
    <text x="40" y="115" fill="#ff6b6b" font-family="Arial, sans-serif" font-size="16" text-anchor="middle">!</text>
  </g>
  
  <!-- Temperature trajectory -->
  <g transform="translate(220, 50)">
    <!-- Graph background -->
    <rect x="0" y="0" width="300" height="200" fill="#1a2332" stroke="#ff6b6b" stroke-width="1" opacity="0.3"/>
    <!-- Temperature line going up steeply -->
    <polyline points="20,160 80,140 140,100 200,60 260,20" 
              fill="none" stroke="#ff6b6b" stroke-width="4"/>
    <!-- Data points -->
    <circle cx="20" cy="160" r="5" fill="#ff6b6b"/>
    <circle cx="80" cy="140" r="5" fill="#ff6b6b"/>
    <circle cx="140" cy="100" r="5" fill="#ff6b6b"/>
    <circle cx="200" cy="60" r="5" fill="#ff6b6b"/>
    <circle cx="260" cy="20" r="5" fill="#ff6b6b"/>
    
    <!-- 1.5°C line -->
    <line x1="0" y1="80" x2="300" y2="80" stroke="#ffd60a" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="310" y="85" fill="#ffd60a" font-family="Arial, sans-serif" font-size="12">1.5°C</text>
    
    <!-- Labels -->
    <text x="150" y="-10" fill="#ffffff" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Temperature Trajectory</text>
    <text x="20" y="220" fill="#8b95a5" font-family="Arial, sans-serif" font-size="10">2020</text>
    <text x="80" y="220" fill="#8b95a5" font-family="Arial, sans-serif" font-size="10">2022</text>
    <text x="140" y="220" fill="#8b95a5" font-family="Arial, sans-serif" font-size="10">2024</text>
    <text x="200" y="220" fill="#8b95a5" font-family="Arial, sans-serif" font-size="10">2026</text>
    <text x="260" y="220" fill="#8b95a5" font-family="Arial, sans-serif" font-size="10">2028</text>
  </g>
  
  <!-- Emissions projections -->
  <g transform="translate(550, 50)">
    <!-- Bar chart -->
    <text x="75" y="-10" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Emissions (Gt CO2)</text>
    
    <!-- 2025 bar -->
    <rect x="10" y="40" width="30" height="60" fill="#ff6b6b" opacity="0.8"/>
    <text x="25" y="115" fill="#8b95a5" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">2025</text>
    <text x="25" y="35" fill="#ffffff" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">42.2</text>
    
    <!-- 2026 bar -->
    <rect x="50" y="30" width="30" height="70" fill="#ff6b6b" opacity="0.8"/>
    <text x="65" y="115" fill="#8b95a5" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">2026</text>
    <text x="65" y="25" fill="#ffffff" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">43.5</text>
    
    <!-- 2030 bar -->
    <rect x="90" y="20" width="30" height="80" fill="#e76f51" opacity="0.8"/>
    <text x="105" y="115" fill="#8b95a5" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">2030</text>
    <text x="105" y="15" fill="#ffffff" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">45-47</text>
  </g>
  
  <!-- Critical status indicators -->
  <g transform="translate(50, 250)">
    <!-- Status box -->
    <rect x="0" y="0" width="200" height="80" rx="8" fill="#1a2332" stroke="#ff6b6b" stroke-width="2"/>
    <text x="100" y="25" fill="#ff6b6b" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">CRITICAL STATUS</text>
    <text x="100" y="45" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">1.5°C Target Lost</text>
    <text x="100" y="65" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">170 Gt Budget Remaining</text>
  </g>
  
  <!-- Adaptation focus -->
  <g transform="translate(300, 250)">
    <!-- Adaptation box -->
    <rect x="0" y="0" width="200" height="80" rx="8" fill="#1a2332" stroke="#ffd60a" stroke-width="2"/>
    <text x="100" y="25" fill="#ffd60a" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">NEW PRIORITY</text>
    <text x="100" y="45" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Adaptation & Resilience</text>
    <text x="100" y="65" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Damage Limitation</text>
  </g>
  
  <!-- Timeline -->
  <g transform="translate(550, 250)">
    <!-- Timeline box -->
    <rect x="0" y="0" width="200" height="80" rx="8" fill="#1a2332" stroke="#4ae290" stroke-width="2"/>
    <text x="100" y="25" fill="#4ae290" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">CRITICAL DECADE</text>
    <text x="100" y="45" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">2025-2035</text>
    <text x="100" y="65" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Determines 2°C vs 3°C</text>
  </g>
  
  <!-- Title -->
  <text x="400" y="30" fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle">2026 Climate Outlook</text>
</svg>
