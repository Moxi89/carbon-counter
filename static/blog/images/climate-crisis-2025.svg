<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#4ae290;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="tempGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#ff9a00;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGrad)" />
  
  <!-- Temperature gauge -->
  <g transform="translate(100, 50)">
    <!-- Thermometer outline -->
    <rect x="0" y="0" width="40" height="300" rx="20" fill="#1a2332" stroke="#4ae290" stroke-width="2"/>
    <!-- Mercury column -->
    <rect x="10" y="50" width="20" height="200" fill="url(#tempGrad)" rx="10"/>
    <!-- Temperature markers -->
    <text x="50" y="55" fill="#ffffff" font-family="Arial, sans-serif" font-size="14">2.0°C</text>
    <text x="50" y="155" fill="#ffffff" font-family="Arial, sans-serif" font-size="14">1.5°C</text>
    <text x="50" y="255" fill="#ffffff" font-family="Arial, sans-serif" font-size="14">1.0°C</text>
    <!-- Warning text -->
    <text x="20" y="330" fill="#ff6b6b" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">CRITICAL</text>
  </g>
  
  <!-- Emissions graph -->
  <g transform="translate(250, 50)">
    <!-- Graph background -->
    <rect x="0" y="0" width="500" height="250" fill="#1a2332" stroke="#4ae290" stroke-width="1" opacity="0.3"/>
    <!-- Grid lines -->
    <line x1="0" y1="50" x2="500" y2="50" stroke="#4ae290" stroke-width="0.5" opacity="0.3"/>
    <line x1="0" y1="100" x2="500" y2="100" stroke="#4ae290" stroke-width="0.5" opacity="0.3"/>
    <line x1="0" y1="150" x2="500" y2="150" stroke="#4ae290" stroke-width="0.5" opacity="0.3"/>
    <line x1="0" y1="200" x2="500" y2="200" stroke="#4ae290" stroke-width="0.5" opacity="0.3"/>
    
    <!-- Emissions line going up -->
    <polyline points="50,180 150,160 250,140 350,100 450,60" 
              fill="none" stroke="#ff6b6b" stroke-width="3"/>
    <!-- Data points -->
    <circle cx="50" cy="180" r="4" fill="#ff6b6b"/>
    <circle cx="150" cy="160" r="4" fill="#ff6b6b"/>
    <circle cx="250" cy="140" r="4" fill="#ff6b6b"/>
    <circle cx="350" cy="100" r="4" fill="#ff6b6b"/>
    <circle cx="450" cy="60" r="4" fill="#ff6b6b"/>
    
    <!-- Labels -->
    <text x="50" y="30" fill="#ffffff" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Global Emissions Trajectory</text>
    <text x="50" y="270" fill="#8b95a5" font-family="Arial, sans-serif" font-size="12">2020</text>
    <text x="200" y="270" fill="#8b95a5" font-family="Arial, sans-serif" font-size="12">2022</text>
    <text x="350" y="270" fill="#8b95a5" font-family="Arial, sans-serif" font-size="12">2024</text>
    <text x="450" y="270" fill="#8b95a5" font-family="Arial, sans-serif" font-size="12">2026</text>
  </g>
  
  <!-- Carbon budget meter -->
  <g transform="translate(300, 320)">
    <rect x="0" y="0" width="200" height="20" rx="10" fill="#1a2332" stroke="#ff6b6b" stroke-width="2"/>
    <rect x="0" y="0" width="30" height="20" rx="10" fill="#4ae290"/>
    <text x="100" y="15" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">170 Gt Remaining</text>
  </g>
  
  <!-- Title -->
  <text x="400" y="30" fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle">2025: The Critical Climate Year</text>
</svg>
