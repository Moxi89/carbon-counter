<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#1a2332"/>
  
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2a3441" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="400" fill="url(#grid)"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#4ae290" font-size="24" font-weight="bold" font-family="Arial, sans-serif">
    Carbon Footprint Calculator
  </text>
  
  <!-- Transportation Section -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="160" height="120" fill="#2a3441" stroke="#4ae290" stroke-width="2" rx="8"/>
    <text x="80" y="25" text-anchor="middle" fill="#f0f0f0" font-size="14" font-weight="bold">Transportation</text>
    <!-- Car icon -->
    <rect x="40" y="40" width="80" height="30" fill="#4ae290" rx="5"/>
    <circle cx="55" cy="80" r="8" fill="#1a2332"/>
    <circle cx="105" cy="80" r="8" fill="#1a2332"/>
    <text x="80" y="105" text-anchor="middle" fill="#f0f0f0" font-size="12">4.6 tons CO2</text>
  </g>
  
  <!-- Home Energy Section -->
  <g transform="translate(240, 80)">
    <rect x="0" y="0" width="160" height="120" fill="#2a3441" stroke="#4ae290" stroke-width="2" rx="8"/>
    <text x="80" y="25" text-anchor="middle" fill="#f0f0f0" font-size="14" font-weight="bold">Home Energy</text>
    <!-- House icon -->
    <polygon points="80,40 40,70 120,70" fill="#4ae290"/>
    <rect x="60" y="70" width="40" height="30" fill="#2a3441"/>
    <rect x="70" y="80" width="20" height="20" fill="#1a2332"/>
    <text x="80" y="105" text-anchor="middle" fill="#f0f0f0" font-size="12">3.2 tons CO2</text>
  </g>
  
  <!-- Food Section -->
  <g transform="translate(430, 80)">
    <rect x="0" y="0" width="160" height="120" fill="#2a3441" stroke="#4ae290" stroke-width="2" rx="8"/>
    <text x="80" y="25" text-anchor="middle" fill="#f0f0f0" font-size="14" font-weight="bold">Food</text>
    <!-- Food icons -->
    <circle cx="60" cy="60" r="15" fill="#4ae290"/>
    <circle cx="100" cy="60" r="15" fill="#52b788"/>
    <circle cx="80" cy="75" r="15" fill="#3a8c6a"/>
    <text x="80" y="105" text-anchor="middle" fill="#f0f0f0" font-size="12">2.8 tons CO2</text>
  </g>
  
  <!-- Shopping Section -->
  <g transform="translate(620, 80)">
    <rect x="0" y="0" width="160" height="120" fill="#2a3441" stroke="#4ae290" stroke-width="2" rx="8"/>
    <text x="80" y="25" text-anchor="middle" fill="#f0f0f0" font-size="14" font-weight="bold">Shopping</text>
    <!-- Shopping bag icon -->
    <rect x="50" y="50" width="60" height="40" fill="#4ae290" rx="3"/>
    <path d="M 60 50 Q 80 35 100 50" fill="none" stroke="#4ae290" stroke-width="3"/>
    <text x="80" y="105" text-anchor="middle" fill="#f0f0f0" font-size="12">1.8 tons CO2</text>
  </g>
  
  <!-- Calculator Display -->
  <g transform="translate(200, 230)">
    <rect x="0" y="0" width="400" height="120" fill="#2a3441" stroke="#4ae290" stroke-width="3" rx="10"/>
    <text x="200" y="25" text-anchor="middle" fill="#f0f0f0" font-size="18" font-weight="bold">Total Annual Footprint</text>
    <text x="200" y="55" text-anchor="middle" fill="#4ae290" font-size="32" font-weight="bold">12.4 tons CO2</text>
    <text x="200" y="80" text-anchor="middle" fill="#f0f0f0" font-size="14">vs Global Average: 4.0 tons</text>
    <text x="200" y="100" text-anchor="middle" fill="#f0f0f0" font-size="12">Reduce by 50% to reach sustainable levels</text>
  </g>
  
  <!-- Reduction arrows -->
  <g transform="translate(50, 320)">
    <path d="M 0 20 L 700 20" stroke="#4ae290" stroke-width="2" stroke-dasharray="5,5"/>
    <polygon points="690,15 700,20 690,25" fill="#4ae290"/>
    <text x="350" y="15" text-anchor="middle" fill="#4ae290" font-size="12" font-weight="bold">Reduction Path</text>
  </g>
  
  <!-- Reduction strategies -->
  <g transform="translate(100, 350)">
    <circle cx="0" cy="0" r="15" fill="#4ae290"/>
    <text x="0" y="5" text-anchor="middle" fill="#1a2332" font-size="12" font-weight="bold">EV</text>
    <text x="0" y="25" text-anchor="middle" fill="#f0f0f0" font-size="10">Electric Vehicle</text>
  </g>
  
  <g transform="translate(250, 350)">
    <circle cx="0" cy="0" r="15" fill="#4ae290"/>
    <text x="0" y="5" text-anchor="middle" fill="#1a2332" font-size="12" font-weight="bold">S</text>
    <text x="0" y="25" text-anchor="middle" fill="#f0f0f0" font-size="10">Solar Panels</text>
  </g>
  
  <g transform="translate(400, 350)">
    <circle cx="0" cy="0" r="15" fill="#4ae290"/>
    <text x="0" y="5" text-anchor="middle" fill="#1a2332" font-size="12" font-weight="bold">P</text>
    <text x="0" y="25" text-anchor="middle" fill="#f0f0f0" font-size="10">Plant-Based</text>
  </g>
  
  <g transform="translate(550, 350)">
    <circle cx="0" cy="0" r="15" fill="#4ae290"/>
    <text x="0" y="5" text-anchor="middle" fill="#1a2332" font-size="12" font-weight="bold">M</text>
    <text x="0" y="25" text-anchor="middle" fill="#f0f0f0" font-size="10">Minimalism</text>
  </g>
  
  <g transform="translate(700, 350)">
    <circle cx="0" cy="0" r="15" fill="#4ae290"/>
    <text x="0" y="5" text-anchor="middle" fill="#1a2332" font-size="12" font-weight="bold">6.2</text>
    <text x="0" y="25" text-anchor="middle" fill="#f0f0f0" font-size="10">Target: 6.2 tons</text>
  </g>
</svg>
