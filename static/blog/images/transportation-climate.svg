<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ae290;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#52b788;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="evGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ae290;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#52b788;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGrad)" />
  
  <!-- Electric car -->
  <g transform="translate(50, 150)">
    <!-- Car body -->
    <rect x="0" y="20" width="120" height="40" rx="10" fill="url(#evGrad)" stroke="#4ae290" stroke-width="2"/>
    <!-- Car roof -->
    <path d="M 20 20 L 30 0 L 90 0 L 100 20 Z" fill="url(#evGrad)" stroke="#4ae290" stroke-width="2"/>
    <!-- Windows -->
    <rect x="35" y="5" width="20" height="15" rx="3" fill="#1a2332" opacity="0.7"/>
    <rect x="60" y="5" width="20" height="15" rx="3" fill="#1a2332" opacity="0.7"/>
    <!-- Wheels -->
    <circle cx="25" cy="65" r="12" fill="#1a2332" stroke="#4ae290" stroke-width="2"/>
    <circle cx="95" cy="65" r="12" fill="#1a2332" stroke="#4ae290" stroke-width="2"/>
    <!-- Electric symbol -->
    <text x="60" y="45" fill="#ffffff" font-family="Arial, sans-serif" font-size="20" text-anchor="middle">E</text>
  </g>
  
  <!-- Bicycle -->
  <g transform="translate(220, 180)">
    <!-- Frame -->
    <line x1="0" y1="20" x2="30" y2="0" stroke="#4ae290" stroke-width="3"/>
    <line x1="30" y1="0" x2="60" y2="0" stroke="#4ae290" stroke-width="3"/>
    <line x1="60" y1="0" x2="80" y2="20" stroke="#4ae290" stroke-width="3"/>
    <line x1="40" y1="0" x2="40" y2="20" stroke="#4ae290" stroke-width="3"/>
    <line x1="0" y1="20" x2="40" y2="20" stroke="#4ae290" stroke-width="3"/>
    <line x1="40" y1="20" x2="80" y2="20" stroke="#4ae290" stroke-width="3"/>
    <!-- Wheels -->
    <circle cx="0" cy="20" r="15" fill="none" stroke="#4ae290" stroke-width="3"/>
    <circle cx="80" cy="20" r="15" fill="none" stroke="#4ae290" stroke-width="3"/>
    <!-- Handlebars -->
    <line x1="25" y1="0" x2="35" y2="-5" stroke="#4ae290" stroke-width="3"/>
    <line x1="35" y1="-5" x2="45" y2="-5" stroke="#4ae290" stroke-width="3"/>
  </g>
  
  <!-- Bus -->
  <g transform="translate(350, 140)">
    <!-- Bus body -->
    <rect x="0" y="20" width="140" height="60" rx="8" fill="#52b788" stroke="#4ae290" stroke-width="2"/>
    <!-- Windows -->
    <rect x="10" y="30" width="20" height="25" rx="3" fill="#1a2332" opacity="0.7"/>
    <rect x="35" y="30" width="20" height="25" rx="3" fill="#1a2332" opacity="0.7"/>
    <rect x="60" y="30" width="20" height="25" rx="3" fill="#1a2332" opacity="0.7"/>
    <rect x="85" y="30" width="20" height="25" rx="3" fill="#1a2332" opacity="0.7"/>
    <rect x="110" y="30" width="20" height="25" rx="3" fill="#1a2332" opacity="0.7"/>
    <!-- Wheels -->
    <circle cx="25" cy="85" r="10" fill="#1a2332" stroke="#4ae290" stroke-width="2"/>
    <circle cx="115" cy="85" r="10" fill="#1a2332" stroke="#4ae290" stroke-width="2"/>
    <!-- Electric symbol -->
    <text x="70" y="55" fill="#ffffff" font-family="Arial, sans-serif" font-size="16" text-anchor="middle">EV</text>
  </g>
  
  <!-- CO2 reduction arrows -->
  <g transform="translate(550, 100)">
    <!-- Big down arrow -->
    <path d="M 0 0 L -15 30 L -7 30 L -7 60 L 7 60 L 7 30 L 15 30 Z" fill="#4ae290" opacity="0.8"/>
    <text x="0" y="80" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">-73%</text>
  </g>
  
  <!-- Emission comparison bars -->
  <g transform="translate(600, 200)">
    <text x="0" y="-10" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">CO2 Emissions</text>
    <!-- Car bar -->
    <rect x="0" y="0" width="30" height="80" fill="#ff6b6b" opacity="0.8"/>
    <text x="15" y="95" fill="#8b95a5" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Car</text>
    <!-- EV bar -->
    <rect x="40" y="50" width="30" height="30" fill="#4ae290" opacity="0.8"/>
    <text x="55" y="95" fill="#8b95a5" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">EV</text>
    <!-- Bike bar -->
    <rect x="80" y="75" width="30" height="5" fill="#52b788" opacity="0.8"/>
    <text x="95" y="95" fill="#8b95a5" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Bike</text>
    <!-- Bus bar -->
    <rect x="120" y="60" width="30" height="20" fill="#4ae290" opacity="0.8"/>
    <text x="135" y="95" fill="#8b95a5" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Bus</text>
  </g>
  
  <!-- Title -->
  <text x="400" y="30" fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle">Transportation Climate Solutions</text>
</svg>
